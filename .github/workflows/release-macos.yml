name: Build macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish the app zip to, such as v1.0.2"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build app zip
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller "PySide6>=6.7.0" "openai>=1.93.0"

      - name: Package app
        run: ./scripts/package-app.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenAI Chat.app.zip
          path: release/OpenAI Chat.app.zip

      - name: Publish GitHub Release
        if: github.ref_type == 'tag' || inputs.tag_name != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "macOS app download"
          gh release upload "$TAG_NAME" "release/OpenAI Chat.app.zip" --clobber
